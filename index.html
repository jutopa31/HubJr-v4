<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HubJr V3 — Residencia</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:#07080D;color:#EDF0F7}
:root{
  --bg0:#07080D;--bg1:#0C0E16;--bg2:#12151F;--bg3:#191D2A;--bg4:#1E2235;
  --border:rgba(255,255,255,0.06);--borderact:rgba(5,217,164,0.28);
  --teal:#05D9A4;--tealdim:rgba(5,217,164,0.10);--tealglow:0 0 20px rgba(5,217,164,0.18);
  --amber:#F0A500;--amberdim:rgba(240,165,0,0.12);
  --red:#E84C4C;--reddim:rgba(232,76,76,0.12);
  --indigo:#6B7FD7;--indigodim:rgba(107,127,215,0.12);
  --green:#4ADE80;--greendim:rgba(74,222,128,0.12);
  --t1:#EDF0F7;--t2:#7D889C;--t3:#3D4459;
  --sw:220px;--hh:60px;--r:10px;--rl:14px
}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 0%,rgba(5,217,164,0.04) 0%,transparent 55%),radial-gradient(ellipse at 85% 100%,rgba(107,127,215,0.03) 0%,transparent 50%);pointer-events:none;z-index:0}
#app{display:flex;height:100vh;position:relative;z-index:1}

/* SIDEBAR */
#sidebar{width:var(--sw);background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:relative}
#sidebar::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--teal),transparent)}
.s-logo{padding:20px 16px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.s-mark{width:34px;height:34px;background:var(--tealdim);border:1px solid var(--borderact);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;color:var(--teal);letter-spacing:-0.5px;flex-shrink:0}
.s-text strong{font-family:'Syne',sans-serif;font-weight:700;font-size:14.5px;color:var(--t1);display:block;letter-spacing:-0.3px}
.s-text span{font-size:9.5px;color:var(--t3);letter-spacing:0.6px;text-transform:uppercase}
.s-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
.s-label{font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;padding:10px 10px 5px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;transition:all .15s;color:var(--t2);font-size:13px;font-weight:400;position:relative;user-select:none}
.ni:hover{background:var(--bg3);color:var(--t1)}
.ni.active{background:var(--tealdim);color:var(--teal);font-weight:500}
.ni.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:16px;background:var(--teal);border-radius:0 3px 3px 0}
.ni svg{width:15px;height:15px;flex-shrink:0}
.ni-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:999px;min-width:17px;text-align:center}
.ni-badge.am{background:var(--amber);color:#000}
.s-foot{padding:10px 8px;border-top:1px solid var(--border)}
.u-card{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:8px;cursor:pointer;transition:background .15s}
.u-card:hover{background:var(--bg3)}
.u-av{width:30px;height:30px;border-radius:7px;background:var(--tealdim);border:1px solid var(--borderact);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:11px;color:var(--teal);flex-shrink:0}
.u-name{font-size:12px;font-weight:500;color:var(--t1)}
.u-role{font-size:10px;color:var(--teal);display:flex;align-items:center;gap:3px;margin-top:1px}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#header{height:var(--hh);background:var(--bg1);border-bottom:1px solid var(--border);padding:0 22px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.h-title{flex:1}
.h-title h1{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;color:var(--t1);letter-spacing:-0.3px}
.h-title p{font-size:11px;color:var(--t2);margin-top:1px}
.h-actions{display:flex;align-items:center;gap:7px}
.h-clock{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--t2);background:var(--bg2);border:1px solid var(--border);padding:4px 9px;border-radius:6px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:7px;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;transition:all .15s}
.btn svg{width:13px;height:13px}
.btn-teal{background:var(--teal);color:#000}
.btn-teal:hover{background:#04c496;box-shadow:var(--tealglow)}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg3);color:var(--t1)}
#content{flex:1;overflow-y:auto;padding:20px}
#content::-webkit-scrollbar{width:4px}
#content::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}

/* ANIMATIONS */
.sec{animation:fadeUp .22s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:18px}
.card-t{font-family:'Syne',sans-serif;font-size:11.5px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}

/* STATS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;display:flex;flex-direction:column;gap:7px;transition:border-color .2s;cursor:default}
.sc:hover{border-color:var(--borderact)}
.s-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center}
.s-icon svg{width:15px;height:15px}
.s-val{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;color:var(--t1);letter-spacing:-1.5px;line-height:1}
.s-lbl{font-size:11px;color:var(--t2)}
.s-sub{font-size:10px;color:var(--t3)}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* WEEK STRIP */
.ws{display:flex;gap:6px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:12px 16px;margin-bottom:16px}
.wd{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:8px 4px;border-radius:8px;cursor:pointer;transition:background .15s}
.wd:hover{background:var(--bg3)}
.wd.today{background:var(--tealdim)}
.wd.today .wdn{color:var(--teal)}
.wdl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--t3)}
.wdn{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--t2)}
.wdd{display:flex;gap:3px}
.dot{width:5px;height:5px;border-radius:50%}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:999px;font-size:10px;font-weight:500;white-space:nowrap}
.bt{background:var(--tealdim);color:var(--teal)}
.ba{background:var(--amberdim);color:var(--amber)}
.br{background:var(--reddim);color:var(--red)}
.bi{background:var(--indigodim);color:var(--indigo)}
.bg2{background:var(--greendim);color:var(--green)}
.bgr{background:var(--bg3);color:var(--t2)}

/* AVATAR */
.av{display:inline-flex;align-items:center;justify-content:center;border-radius:6px;font-family:'Syne',sans-serif;font-weight:700;flex-shrink:0}
.av-sm{width:20px;height:20px;font-size:8.5px;border-radius:5px}
.av-md{width:26px;height:26px;font-size:10px;border-radius:7px}
.av-lg{width:36px;height:36px;font-size:14px;border-radius:9px}

/* TASK ITEM */
.ti{display:flex;align-items:flex-start;gap:11px;padding:11px 0;border-bottom:1px solid var(--border)}
.ti:last-child{border-bottom:none}
.tck{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--borderact);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.tck.done{background:var(--teal);border-color:var(--teal)}
.tck.done svg{width:9px;height:9px;color:#000}
.tt{font-size:13px;color:var(--t1);line-height:1.4}
.tt.done{text-decoration:line-through;color:var(--t3)}
.tm{display:flex;align-items:center;gap:7px;margin-top:4px;flex-wrap:wrap}

/* PATIENT CARDS */
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px}
.pc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:15px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.pc:hover{border-color:var(--borderact);transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,0,0,.35)}
.pc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:var(--rl) var(--rl) 0 0}
.pc.internado::before{background:var(--teal)}
.pc.ambulatorio::before{background:var(--indigo)}
.pc.alta::before{background:var(--green)}
.pc.guardia::before{background:var(--amber)}
.pid{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--t3);letter-spacing:.4px}
.pdiag{font-size:13px;font-weight:500;color:var(--t1);margin:5px 0;line-height:1.4}
.pfoot{display:flex;align-items:center;justify-content:space-between;margin-top:9px}

/* MODAL */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg1);border:1px solid var(--border);border-radius:var(--rl);width:580px;max-width:95vw;max-height:85vh;overflow-y:auto;animation:sUp .22s ease}
@keyframes sUp{from{opacity:0;transform:scale(.97) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:var(--bg4)}
.mh{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.mb{padding:18px 22px}
.cbtn{background:none;border:none;color:var(--t2);cursor:pointer;padding:4px;border-radius:5px;transition:all .15s;display:flex}
.cbtn:hover{background:var(--bg3);color:var(--t1)}

/* EVOLUTION TIMELINE */
.etl{position:relative;padding-left:22px}
.etl::before{content:'';position:absolute;left:6px;top:8px;bottom:8px;width:1px;background:var(--border)}
.ee{position:relative;margin-bottom:18px}
.ee::before{content:'';position:absolute;left:-19px;top:6px;width:8px;height:8px;background:var(--teal);border-radius:50%;border:2px solid var(--bg1)}
.ed{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--teal);margin-bottom:5px}
.etxt{font-size:12.5px;color:var(--t1);line-height:1.6;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.eau{font-size:10px;color:var(--t3);margin-top:4px}

/* KANBAN */
.kb{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;align-items:start}
.kc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:12px}
.kh{display:flex;align-items:center;gap:7px;margin-bottom:10px;padding-bottom:9px;border-bottom:1px solid var(--border)}
.kht{font-size:11.5px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;flex:1}
.khc{font-size:10px;background:var(--bg3);color:var(--t3);padding:2px 7px;border-radius:999px}
.kcard{background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:11px;margin-bottom:7px;cursor:pointer;transition:all .15s}
.kcard:hover{border-color:var(--borderact);transform:translateY(-1px)}
.kct{font-size:12.5px;color:var(--t1);line-height:1.4;margin-bottom:7px}
.kcf{display:flex;align-items:center;justify-content:space-between}

/* CALENDAR */
.cg{display:grid;grid-template-columns:1fr 290px;gap:10px}
.cm{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:18px}
.cnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cmn{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--t1)}
.cnbtn{background:var(--bg3);border:1px solid var(--border);color:var(--t2);width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.cnbtn:hover{background:var(--bg4);color:var(--t1)}
.cwk{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:3px}
.cwkd{text-align:center;font-size:9.5px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;padding:3px 0}
.cdays{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.cday{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border-radius:7px;cursor:pointer;transition:background .12s}
.cday:hover{background:var(--bg3)}
.cday.today{background:var(--tealdim)}
.cday.today .cdnum{color:var(--teal);font-weight:700}
.cday.om .cdnum{color:var(--t3)}
.cdnum{font-family:'Syne',sans-serif;font-size:12.5px;color:var(--t2)}
.cdevs{display:flex;gap:2px}

/* EVENTS */
.ei{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--border)}
.ei:last-child{border-bottom:none}
.eidb{width:38px;flex-shrink:0;text-align:center}
.eid{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--t1);line-height:1}
.eim{font-size:9px;text-transform:uppercase;letter-spacing:.4px;color:var(--t3)}
.eii{flex:1}
.eit{font-size:13px;font-weight:500;color:var(--t1)}
.eid2{font-size:10.5px;color:var(--t2);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}

/* ACADEMIA */
.tabs{display:flex;gap:3px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:3px;margin-bottom:14px;width:fit-content}
.tab{padding:6px 14px;border-radius:7px;font-size:12.5px;font-weight:500;cursor:pointer;transition:all .15s;color:var(--t2)}
.tab:hover{color:var(--t1)}
.tab.active{background:var(--bg3);color:var(--t1)}
.ri{display:flex;gap:13px;padding:13px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.ri:last-child{border-bottom:none}
.ricon{width:34px;height:34px;background:var(--indigodim);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ricon svg{width:15px;height:15px;color:var(--indigo)}
.rt{font-size:13px;font-weight:500;color:var(--t1);line-height:1.4}
.rm{font-size:10.5px;color:var(--t2);margin-top:2px}

/* FILTER BAR */
.fb{display:flex;gap:7px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.si{flex:1;min-width:160px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px 13px;font-size:12.5px;color:var(--t1);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s}
.si:focus{border-color:var(--borderact)}
.si::placeholder{color:var(--t3)}
.fp{padding:5px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:999px;font-size:11.5px;color:var(--t2);cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none}
.fp:hover{border-color:var(--borderact);color:var(--teal)}
.fp.active{background:var(--tealdim);border-color:var(--borderact);color:var(--teal)}
.rchip{display:flex;align-items:center;gap:6px;padding:4px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:999px;cursor:pointer;transition:all .15s;font-size:11.5px;color:var(--t2);user-select:none}
.rchip:hover{border-color:var(--borderact)}
.rchip.active{border-color:var(--borderact);color:var(--t1)}
.divider{height:1px;background:var(--border);margin:14px 0}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:var(--bg2);border:1px solid var(--borderact);border-radius:10px;padding:11px 15px;font-size:12.5px;color:var(--t1);z-index:999;animation:fadeUp .2s ease;display:flex;gap:8px;align-items:center;box-shadow:0 4px 24px rgba(0,0,0,.5)}

/* RESPONSIVE */
@media(max-width:1100px){.sg{grid-template-columns:repeat(2,1fr)}.kb{grid-template-columns:1fr}.cg{grid-template-columns:1fr}}
@media(max-width:720px){:root{--sw:56px}.ni span,.s-text,.u-info,.s-label,.ni-badge{display:none}.s-mark{margin:0 auto}}
*{scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar"></aside>
  <div id="main">
    <header id="header"></header>
    <main id="content"></main>
  </div>
</div>
<div id="modal-root"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const R = [
  {id:1,name:'García',full:'Dr. García',i:'G',c:'#05D9A4',bg:'rgba(5,217,164,.12)'},
  {id:2,name:'López',full:'Dr. López',i:'L',c:'#F0A500',bg:'rgba(240,165,0,.12)'},
  {id:3,name:'Martínez',full:'Dra. Martínez',i:'M',c:'#8B5CF6',bg:'rgba(139,92,246,.12)'},
  {id:4,name:'Rodríguez',full:'Dr. Rodríguez',i:'R',c:'#E84C4C',bg:'rgba(232,76,76,.12)'},
  {id:5,name:'Sánchez',full:'Dra. Sánchez',i:'S',c:'#6B7FD7',bg:'rgba(107,127,215,.12)'},
];

const PATIENTS = [
  {id:'PAC-001',age:67,sex:'M',sector:'Sala 3 — Cama 12',status:'internado',diagnosis:'ACV isquémico territorio ACM derecha',assignedTo:[1,3],evolutions:[

    {date:'2026-03-15',author:2,text:'Debilidad progresiva en MMII desde hace 10 días. EDSS basal 2.0. Se indica pulsos de metilprednisolona x3 días.'},
    {date:'2026-03-18',author:2,text:'Post-pulsos: leve mejoría subjetiva. Fuerza 4/5 distal. RMN: nueva lesión T2 cordón lateral. Control en 1 mes.'},
  ]},
  {id:'PAC-003',age:72,sex:'M',sector:'Sala 5 — Cama 3',status:'internado',diagnosis:'Epilepsia de difícil control — estado postcrítico',assignedTo:[4,5],evolutions:[
    {date:'2026-03-20',author:4,text:'Ingresa por crisis tónico-clónica generalizada de 3 minutos. Sin recuperación completa. EEG: actividad epileptiforme bilateral.'},
    {date:'2026-03-21',author:5,text:'Mayor lucidez. Responde órdenes simples. Se optimiza dosis de ácido valproico. Aguarda nivel sérico.'},
  ]},
  {id:'PAC-004',age:58,sex:'F',sector:'Guardia — UC',status:'guardia',diagnosis:'Cefalea en trueno — a descartar HSA',assignedTo:[3],evolutions:[
    {date:'2026-03-21',author:3,text:'Ingresa por cefalea de inicio explosivo. TC sin hemorragia subaracnoidea visible. PL: xantocromía positiva. Se interna para estudio y monitoreo neurológico.'},

const res = id => R.find(r=>r.id===id);

function av(id,cls='av-md'){
  const r=res(id); if(!r) return '';
  return `<span class="av ${cls}" style="background:${r.bg};color:${r.c}">${r.i}</span>`;
}

function prio(p){
  const m={alta:'br Alta',media:'ba Media',baja:'bgr Baja'};
  const [c,l]=m[p].split(' ');
  return `<span class="badge ${c}">${l}</span>`;
}

function sbadge(s){
  const m={internado:'bt Internado',ambulatorio:'bi Ambulatorio',alta:'bg2 Alta',guardia:'ba Guardia',
           pendiente:'ba Pendiente',en_curso:'bi En curso',completada:'bg2 Completada'};
  const [c,...l]=(m[s]||'bgr '+s).split(' ');
  return `<span class="badge ${c}">${l.join(' ')}</span>`;
}

function tbadge(t){
  const m={ateneo:'bt Ateneo',clase:'bi Clase',guardia:'ba Guardia',presentacion:'br Presentación'};
  const [c,...l]=(m[t]||'bgr '+t).split(' ');
  return `<span class="badge ${c}">${l.join(' ')}</span>`;
}

function fdate(d){
  const [,m,day]=d.split('-');
  const ms=['','ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(day)} ${ms[parseInt(m)]}`;
}

function dow(d){return['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'][new Date(d).getDay()]}

function ecolor(t){return{ateneo:'#05D9A4',clase:'#6B7FD7',guardia:'#F0A500',presentacion:'#E84C4C'}[t]||'#3D4459'}

function toast(msg){
  const t=document.createElement('div');
  t.className='toast';
  t.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#05D9A4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> ${msg}`;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2800);
}

  const fd=cd.getDay(),dim=new Date(y,mo+1,0).getDate(),dipm=new Date(y,mo,0).getDate();
  const off=fd===0?6:fd-1;
  const days=[];
  for(let i=off-1;i>=0;i--) days.push({d:dipm-i,m:mo-1,y,o:true});
  for(let i=1;i<=dim;i++) days.push({d:i,m:mo,y,o:false});
  while(days.length%7!==0) days.push({d:days.length-dim-off+1,m:mo+1,y,o:true});

  const dHTML=days.map(({d,m,y:dy,o})=>{
    const ds=`${dy}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const evs=EVENTS.filter(e=>e.date===ds);
    const isT=d===TODAY.getDate()&&m===TODAY.getMonth()&&dy===TODAY.getFullYear();
    return `<div class="cday${isT?' today':''}${o?' om':''}">
      <span class="cdnum">${d}</span>
      <div class="cdevs">${evs.map(e=>`<span class="dot" style="background:${ecolor(e.type)}"></span>`).join('')}</div>
    </div>`;
  }).join('');

  const upcoming=EVENTS.filter(e=>e.date>=`${y}-${String(mo+1).padStart(2,'0')}-01`).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,6);
  const uHTML=upcoming.map(e=>{
    const [,mm,dd]=e.date.split('-');
    const ms=['','ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    return `<div class="ei">
      <div class="eidb"><div class="eid">${parseInt(dd)}</div><div class="eim">${ms[parseInt(mm)]}</div></div>
      <div class="eii">
        <div class="eit">${e.title}</div>
        <div class="eid2">${tbadge(e.type)}<span style="font-size:10px;color:var(--t3)">${e.time} · ${e.loc}</span></div>
      </div>
    </div>`;
  }).join('');

  const legend=['ateneo','clase','guardia','presentacion'].map(t=>{
    const lb={ateneo:'Ateneo',clase:'Clase',guardia:'Guardia',presentacion:'Presentación'};
    return `<div style="display:flex;align-items:center;gap:5px"><span class="dot" style="background:${ecolor(t)};width:7px;height:7px"></span><span style="font-size:10.5px;color:var(--t2)">${lb[t]}</span></div>`;
  }).join('');

  return `<div class="sec"><div class="cg">
    <div class="cm">
      <div class="cnav">
        <div class="cnbtn" id="cprev"><i data-lucide="chevron-left" style="width:13px;height:13px"></i></div>
        <span class="cmn">${mns[mo]} ${y}</span>
        <div class="cnbtn" id="cnext"><i data-lucide="chevron-right" style="width:13px;height:13px"></i></div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">${legend}</div>
      <div class="cwk">${['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].map(d=>`<div class="cwkd">${d}</div>`).join('')}</div>
      <div class="cdays">${dHTML}</div>
    </div>
    <div class="card"><div class="card-t">Próximos eventos</div>${uHTML}</div>
  </div></div>`;
}

// ── ACADEMIA ──────────────────────────────────────────────────────────────────
function renderAcademia(){
  const tabs=[['lecturas','Lecturas'],['ateneos','Ateneos y Clases'],['presentaciones','Presentaciones']];
  const tl={guia:'Guía',articulo:'Artículo',revision:'Revisión'};
  const tc={guia:'bt',articulo:'bi',revision:'ba'};

  let body='';
  if(S.acadTab==='lecturas'){
    body=READINGS.map(r=>`
      <div class="ri">
        <div class="ricon"><i data-lucide="file-text"></i></div>
        <div style="flex:1">
          <div class="rt">${r.title}</div>
          <div class="rm">${r.journal}</div>
          <div style="display:flex;align-items:center;gap:5px;margin-top:6px;flex-wrap:wrap">
            <span class="badge ${tc[r.type]}">${tl[r.type]}</span>
            ${r.mandatory?'<span class="badge br">Obligatorio</span>':''}
            <div style="display:flex;gap:2px;margin-left:4px">${r.assignedTo.map(id=>av(id,'av-sm')).join('')}</div>
          </div>
        </div>
        <button class="btn btn-ghost" style="padding:4px 9px;font-size:11px;align-self:flex-start" onclick="toast('Abriendo material…')">
          <i data-lucide="external-link" style="width:11px;height:11px"></i>
        </button>
      </div>`).join('');
  }

  if(S.acadTab==='ateneos'){
    const ms=['','ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    body=EVENTS.filter(e=>e.type==='ateneo'||e.type==='clase').sort((a,b)=>a.date.localeCompare(b.date)).map(e=>{
      const pr=e.presenter?res(e.presenter):null;
      const [,mm,dd]=e.date.split('-');
      return `<div style="display:flex;gap:13px;padding:13px 0;border-bottom:1px solid var(--border);align-items:flex-start">
        <div style="width:44px;flex-shrink:0;background:var(--bg3);border-radius:8px;padding:7px 4px;text-align:center">
          <div style="font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--t1);line-height:1">${parseInt(dd)}</div>
          <div style="font-size:9px;color:var(--t3);text-transform:uppercase">${ms[parseInt(mm)]}</div>
        </div>
        <div style="flex:1">
          <div style="font-size:13.5px;font-weight:500;color:var(--t1)">${e.title}</div>
          <div style="font-size:11.5px;color:var(--t2);margin-top:3px">${e.desc}</div>
          <div style="display:flex;align-items:center;gap:7px;margin-top:7px;flex-wrap:wrap">
            ${tbadge(e.type)}<span style="font-size:10.5px;color:var(--t3)">${e.time} · ${e.loc}</span>
            ${pr?`<div style="display:flex;align-items:center;gap:4px;margin-left:auto">${av(pr.id,'av-sm')}<span style="font-size:10.5px;color:var(--t2)">${pr.full}</span></div>`:''}
          </div>
        </div>
      </div>`;
    }).join('');
  }

  if(S.acadTab==='presentaciones'){
    const pres=EVENTS.filter(e=>e.type==='presentacion').sort((a,b)=>a.date.localeCompare(b.date));
    const prep=TASKS.filter(t=>t.type==='presentacion'||t.type==='clase');
    body=`
      <div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:10px">Presentaciones programadas</div>
      ${pres.map(e=>{const pr=e.presenter?res(e.presenter):null;return `
        <div style="display:flex;gap:12px;padding:12px;background:var(--bg3);border-radius:9px;margin-bottom:7px;align-items:flex-start">
          <div style="flex:1">
            <div style="font-size:13px;font-weight:500;color:var(--t1)">${e.title}</div>
            <div style="font-size:11.5px;color:var(--t2);margin-top:3px">${e.desc}</div>
            <div style="font-size:10.5px;color:var(--t3);margin-top:5px">${fdate(e.date)} · ${e.time} · ${e.loc}</div>
          </div>
          ${pr?`<div style="display:flex;flex-direction:column;align-items:center;gap:3px">${av(pr.id,'av-lg')}<span style="font-size:9.5px;color:var(--t3)">${pr.name}</span></div>`:''}
        </div>`}).join('')}
      <div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin:16px 0 10px">En preparación</div>
      ${prep.map(t=>{const r=res(t.assignedTo);return `
        <div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg3);border-radius:8px;margin-bottom:6px">
          ${r?av(r.id):''}
          <div style="flex:1"><div style="font-size:12.5px;font-weight:500;color:var(--t1)">${t.title}</div>
          <div style="font-size:10.5px;color:var(--t3);margin-top:2px">Vence ${fdate(t.due)}</div></div>
          ${sbadge(t.status)}
        </div>`}).join('')}`;
  }

  return `<div class="sec">
    <div class="tabs">${tabs.map(([id,l])=>`<div class="tab${S.acadTab===id?' active':''}" data-at="${id}">${l}</div>`).join('')}</div>
    <div class="card">${body}</div>
  </div>`;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  renderSidebar(); renderHeader();
  const fn={dashboard:renderDashboard,pacientes:renderPacientes,tareas:renderTareas,calendario:renderCalendario,academia:renderAcademia};
  document.getElementById('content').innerHTML=fn[S.section]();
  lucide.createIcons();
  attach();
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
function attach(){
  document.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click',()=>{S.section=el.dataset.nav;render()}));
  document.querySelectorAll('[data-pf]').forEach(el=>el.addEventListener('click',()=>{S.patFilter=el.dataset.pf;render()}));
  document.querySelectorAll('[data-pid]').forEach(el=>el.addEventListener('click',()=>showPModal(el.dataset.pid)));
  document.querySelectorAll('[data-tf]').forEach(el=>el.addEventListener('click',()=>{S.taskFilter=el.dataset.tf;render()}));
  document.querySelectorAll('[data-at]').forEach(el=>el.addEventListener('click',()=>{S.acadTab=el.dataset.at;render()}));
  const cp=document.getElementById('cprev'),cn=document.getElementById('cnext');
  if(cp) cp.addEventListener('click',()=>{S.calOff--;render()});
  if(cn) cn.addEventListener('click',()=>{S.calOff++;render()});
  const hb=document.getElementById('h-btn');
  if(hb) hb.addEventListener('click',()=>toast('Función disponible en versión completa'));
}

// ── CLOCK ─────────────────────────────────────────────────────────────────────
setInterval(()=>{const c=document.getElementById('clk');if(c)c.textContent=new Date().toTimeString().slice(0,5)},15000);

// ── INIT ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
